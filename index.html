<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Sorpresa para Nayely 💗</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;

overflow:hidden;

background:
linear-gradient(
180deg,
#ffb4d9,
#ffc6e6,
#ffe0f0
);

font-family:

-apple-system,
sans-serif;

display:flex;

justify-content:center;

align-items:center;

color:white;

text-align:center;

}

#pantalla{

padding:25px;

width:100%;

}

h1{

font-size:48px;

text-shadow:

0 0 30px #ff4fb1;

animation:

flotar 3s infinite;

}

.sub{

margin-top:15px;

font-size:18px;

opacity:.9;

}

.numero{

margin-top:40px;

font-size:160px;

font-weight:900;

animation:

latido .8s infinite;

}

#final{

display:none;

animation:

aparecer 2s;

}

.foto{

width:290px;

height:290px;

object-fit:cover;

border-radius:35px;

margin-top:20px;

border:10px solid white;

box-shadow:

0 0 60px hotpink;

}

.mensaje{

margin-top:30px;

font-size:34px;

line-height:1.4;

}

.texto{

margin-top:25px;

font-size:19px;

padding:20px;

background:

rgba(255,255,255,.15);

border-radius:25px;

backdrop-filter:

blur(15px);

}

.unicornio{

position:absolute;

font-size:55px;

animation:

mover 12s linear infinite;

}

.u1{

left:8%;

top:8%;

}

.u2{

right:10%;

top:20%;

}

.u3{

left:12%;

bottom:10%;

}

.u4{

right:12%;

bottom:8%;

}

.estrella{

position:absolute;

animation:

brillar 2s infinite;

}

@keyframes mover{

50%{

transform:

translateY(-30px)
rotate(8deg);

}

}

@keyframes latido{

50%{

transform:

scale(1.18);

}

}

@keyframes aparecer{

from{

opacity:0;

transform:

translateY(100px);

}

}

@keyframes flotar{

50%{

transform:

translateY(-10px);

}

}

@keyframes brillar{

50%{

opacity:.2;

}

}

.confeti{

position:absolute;

font-size:30px;

animation:

caer 4s linear infinite;

}

@keyframes caer{

from{

transform:

translateY(-120px);

}

to{

transform:

translateY(120vh);

}

}

.pulso{

animation:

pulso 1s infinite;

}

@keyframes pulso{

50%{

transform:scale(1.04);

}

}

</style>

</head>

<body onclick="avanzar()">

<div class="unicornio u1">🦄</div>
<div class="unicornio u2">🦄</div>
<div class="unicornio u3">🦄</div>
<div class="unicornio u4">🦄</div>

<div class="estrella"
style="top:12%;left:35%">✨</div>

<div class="estrella"
style="top:25%;right:30%">💗</div>

<div class="estrella"
style="bottom:20%;left:25%">🌸</div>

<div id="pantalla">

<h1 id="titulo">

Te espera una sorpresa…

</h1>

<div class="sub">

Toca cualquier parte de la pantalla 💗

</div>

<div
class="numero"
id="contador">

0

</div>

<div id="final">

<img
src="foto.jpeg"
class="foto">

<div class="mensaje pulso">

🎉 Ya solo faltan 5 días para tu lindo y hermoso cumpleaños, Nayelycita 💗

</div>

<div class="texto">

Que estos días se llenen de risas,
momentos bonitos y emoción.

Y que cuando llegue ese día,
todo sea tan especial como mereces ✨🦄🌸

</div>

</div>

</div>

<audio
id="musica"
loop>

<source
src="./musica.mp3" type="audio/mpeg">

</audio>

<script>

let n=0;

function avanzar(){

if(n<5){

n++;

contador.innerHTML=n;

}

if(n===5){

setTimeout(
mostrarFinal,
700
);

}

}

function mostrarFinal(){

document
.getElementById(
"contador"
)
.style.display=
"none";

document
.getElementById(
"titulo"
)
.innerHTML=
"✨ Sorpresa ✨";

document
.getElementById(
"final"
)
.style.display=
"block";

document
.getElementById(
"musica"
)
.play();

for(
let i=0;
i<120;
i++
){

let c=
document
.createElement(
"div"
);

c.className=
"confeti";

c.innerHTML=
["🎉","💗","✨","🌸"][

Math.floor(
Math.random()*4

)];

c.style.left=
Math.random()*100+
"vw";

c.style.animationDelay=
Math.random()*3+
"s";

document.body
.appendChild(c);

}

}

</script>

</body>

</html>
