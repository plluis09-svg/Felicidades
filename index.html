<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Una pequeña felicitación ✨</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff7eb3,#ff758c,#ffb199);
font-family:Arial,sans-serif;
overflow:hidden;
}

.card{
background:rgba(255,255,255,.15);
backdrop-filter:blur(10px);
padding:40px;
border-radius:25px;
text-align:center;
color:white;
width:320px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
font-size:32px;
margin-bottom:15px;
}

p{
font-size:18px;
line-height:1.6;
}

button{
margin-top:20px;
padding:12px 24px;
border:none;
border-radius:20px;
background:white;
color:#ff4f81;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

.oculto{
display:none;
margin-top:20px;
font-size:20px;
animation:aparece 1s;
}

@keyframes aparece{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="card">
<h1>🎉 ¡Felicitaciones! 🎉</h1>

<p>
Hoy no es un día cualquiera.  
Es un momento para sonreír, celebrar y recordar lo especial que eres.
</p>

<button onclick="mostrar()">
Abrir sorpresa ✨
</button>

<div id="mensaje" class="oculto">
🌹 Que la vida te regale momentos hermosos, éxitos y mucha felicidad.
</div>

</div>

<script>
function mostrar(){
document.getElementById("mensaje").style.display="block";
}
</script>

</body>
</html>
